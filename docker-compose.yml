services:

  postgres:
    restart: unless-stopped
    image: postgres:latest
    # ports:
      # - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    command: postgres -c 'max_connections=1000'
    environment:
      POSTGRES_PASSWORD: 'postgres'
      POSTGRES_USER: dbuser

  redis:
    restart: unless-stopped
    image: redis:latest

  web:
    restart: unless-stopped
    build:
      context: .

    depends_on:
      - postgres
    volumes:
      - static:/www
    # env_file: .env
    environment:
      DEBUG: 'true'
      CHANNEL_LAYERS: '{"default": {"BACKEND": "channels_redis.core.RedisChannelLayer", "CONFIG": {"hosts": [["redis", 6379]]}}}'

      EMAIL_BACKEND: 'django.core.mail.backends.smtp.EmailBackend'
      DEFAULT_FROM_EMAIL: 'Obóz Studentów PWr <oboz@samorzad.pwr.edu.pl>'
      EMAIL_HOST: 'smtp.gmail.com'
      EMAIL_HOST_USER: 'oboz@samorzad.pwr.edu.pl'
      EMAIL_PORT: 587
      EMAIL_USE_TLS: 'True'
      EMAIL_USE_SSL: 'False'

      DB_ENGINE: 'django.db.backends.postgresql'
      DB_NAME: 'postgres'
      DB_USER: 'dbuser'
      DB_PASSWORD: 'postgres'
      DB_HOST: 'postgres'
      STATIC_ROOT: '/www/static'
      MEDIA_ROOT: '/www/media'
      ALLOWED_HOSTS: 'localhost,192.168.1.143'
      CSRF_TRUSTED_ORIGINS: 'http://localhost:8080'
      CORS_ALLOW_ALL_ORIGINS: 'true'
      SECRET_KEY: '!nbkyn4osdgpzggv)(9w=&u_a((f!k9=m^bo%$1knzya%7-e++'

  nginx:
    restart: unless-stopped
    build: ./nginx/
    depends_on:
      - web
    ports:
      - "8080:80"
    volumes:
      - static:/usr/share/nginx/html
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    # command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"


  celery_worker:
    restart: unless-stopped
    build:
      context: .
    image: django_celery_worker
    command: ./scripts/start-celeryworker.sh
    user: "app"
    # volumes:
    #   - .:/app
    env_file: .dev.env
    environment:
      CELERY_BROKER: redis://redis:6379/0
      CELERY_BACKEND: django-db
    depends_on:
      - redis
      - postgres
      - web

  celery_beat:
    build:
      context: .
    image: django_celery_beat
    command: ./scripts/start-celerybeat.sh
    user: "app"
    # volumes:
    #   - .:/app
    env_file: .dev.env
    environment:
      CELERY_BROKER: redis://redis:6379/0
      CELERY_BACKEND: django-db
    depends_on:
      - redis
      - postgres
      - celery_worker

    # certbot:
    #   image: certbot/certbot
    #   volumes:
    #     - certbot_conf:/etc/letsencrypt
    #     - certbot_www:/var/www/certbot
    #     - certbot_logs:/var/log/letsencrypt
    #   entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    #   command: "certonly --webroot --webroot-path /var/www/certbot/ -d appka.obozstudentowpwr.com -d apka.obozstudentowpwr.com -m marvin@prasa-polska.com --agree-tos --staple --non-interactive"

volumes:
  static:
  postgres_data:
