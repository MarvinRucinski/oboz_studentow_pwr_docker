services:

  postgres:
    restart: unless-stopped
    image: postgres:latest
    # ports:
      # - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    command: postgres -c 'max_connections=1000'
    environment:
      POSTGRES_PASSWORD: 'postgres'
      POSTGRES_USER: dbuser

  redis:
    restart: unless-stopped
    image: redis:latest

  web:
    restart: unless-stopped
    # Build the backend image once and reuse it for celery services to avoid multiple
    # parallel identical builds (helps with unstable SSH connections during remote builds)
    image: oboz_backend:latest
    build:
      context: .

    depends_on:
      - postgres
    volumes:
      - static:/www
    env_file: .dev.env

  nginx:
    restart: unless-stopped
    build: ./nginx/
    depends_on:
      - web
    ports:
      - "8080:80"
    volumes:
      - static:/usr/share/nginx/html
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    # command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"


  celery_worker:
    restart: unless-stopped
    # Reuse the already built backend image instead of triggering another build
    image: oboz_backend:latest
    command: ./scripts/start-celeryworker.sh
    user: "app"
    env_file: .dev.env
    depends_on:
      - redis
      - postgres
      - web

  celery_beat:
    restart: unless-stopped
    # Reuse the already built backend image instead of triggering another build
    image: oboz_backend:latest
    command: ./scripts/start-celerybeat.sh
    user: "app"
    env_file: .dev.env
    depends_on:
      - redis
      - postgres
      - celery_worker

volumes:
  static:
  postgres_data:
