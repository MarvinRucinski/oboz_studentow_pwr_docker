services:

  postgres:
    environment:
      POSTGRES_PASSWORD: ''
      POSTGRES_PASSWORD_FILE: '/run/secrets/db_password'
    secrets:
      - db_password


  web:
    env_file: .prod.env
    build:
      context: .

    secrets:
      - secret_key
      - db_password
      - email_host_password
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    ports:
      - "80:80"
      - "443:443"

  celery_worker:
    env_file: .prod.env
    secrets:
      - secret_key
      - db_password

  celery_beat:
    env_file: .prod.env
    secrets:
      - secret_key
      - db_password


secrets:
  secret_key:
    file: /secrets/secret_key_production.txt
  db_password:
    file: /secrets/db_password.txt
  email_host_password:
    file: /secrets/email_host_password.txt