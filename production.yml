services:

  postgres:
    environment:
      POSTGRES_PASSWORD: ''
      POSTGRES_PASSWORD_FILE: '/run/secrets/db_password'
    secrets:
      - db_password


  web:
    environment:
      DEBUG: 'False'

      EMAIL_BACKEND: 'django.core.mail.backends.smtp.EmailBackend'
      EMAIL_HOST: 'host.docker.internal'
      DEFAULT_FROM_EMAIL: 'Obóz Studentów Pwr <noreply@obozstudentowpwr.com>'

      DB_PASSWORD: '/run/secrets/db_password'
      SECRET_KEY: '/run/secrets/secret_key'
      ALLOWED_HOSTS: '188.68.236.144,130.61.148.125,appka.obozstudentowpwr.com,apka.obozstudentowpwr.com,test.obozstudentowpwr.com'
    secrets:
      - secret_key
      - db_password
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    ports:
      - "80:80"

secrets:
  secret_key:
    file: /secrets/secret_key_production.txt
  db_password:
    file: /secrets/db_password.txt